<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>ストレッチタイマー</title>
<meta name="theme-color" content="#0e5e4a">
<link rel="manifest" href="manifest.webmanifest">
<link rel="icon" type="image/png" href="icons/icon-192.png">
<link rel="apple-touch-icon" href="icons/apple-touch-icon.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="ストレッチ">
<style>
  :root{
    --ink:#1c2430;
    --paper:#f6f4ee;
    --stretch:#0e5e4a;
    --stretch-soft:#e3f0ea;
    --rest:#2b3a67;
    --rest-soft:#e7eaf4;
    --ready:#8a5a12;
    --line:#d8d4c8;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%}
  body{
    font-family:"Hiragino Kaku Gothic ProN","Hiragino Sans","Yu Gothic",system-ui,sans-serif;
    background:var(--paper);
    color:var(--ink);
    transition:background .5s ease;
    display:flex;flex-direction:column;align-items:center;
    min-height:100dvh;
  }
  body.phase-stretch{background:var(--stretch)}
  body.phase-rest{background:var(--rest)}
  body.phase-ready{background:var(--ink)}
  body.phase-stretch,body.phase-rest,body.phase-ready{color:#fff}

  .wrap{width:100%;max-width:480px;padding:24px 20px 40px;display:flex;flex-direction:column;gap:20px;flex:1}

  h1{font-size:15px;font-weight:600;letter-spacing:.18em}
  .setup label{display:block;font-size:12px;letter-spacing:.08em;margin-bottom:6px;opacity:.75}
  .setup input[type=text]{
    width:100%;font-size:20px;padding:12px 14px;
    border:1.5px solid var(--line);border-radius:10px;
    background:#fff;color:var(--ink);
    font-variant-numeric:tabular-nums;
  }
  .setup .hint{font-size:12px;opacity:.6;margin-top:6px;line-height:1.6}
  .row{display:flex;align-items:center;gap:10px;margin-top:12px;font-size:14px}
  .row input[type=checkbox]{width:18px;height:18px;accent-color:var(--stretch)}

  .preset-row{display:flex;gap:8px;margin-bottom:16px}
  .preset-row select{
    flex:1;min-width:0;font-size:15px;padding:10px 12px;
    border:1.5px solid var(--line);border-radius:10px;
    background:#fff;color:var(--ink);font-family:inherit;
  }
  .preset-row .mini{
    flex:0 0 auto;font-size:14px;font-weight:600;padding:10px 14px;
    border:1.5px solid var(--line);border-radius:10px;
    background:#fff;color:var(--ink);
  }
  .preset-row .mini:disabled{opacity:.4;cursor:default}

  .display{
    flex:1;display:flex;flex-direction:column;justify-content:center;align-items:center;
    text-align:center;gap:8px;min-height:260px;
  }
  .phase-label{font-size:22px;font-weight:700;letter-spacing:.3em;text-indent:.3em}
  .time{
    font-size:min(34vw,150px);font-weight:700;line-height:1;
    font-variant-numeric:tabular-nums;letter-spacing:-.02em;
  }
  .sub{font-size:14px;opacity:.75;font-variant-numeric:tabular-nums}
  .progress{width:100%;height:6px;border-radius:3px;background:rgba(255,255,255,.25);overflow:hidden;margin-top:10px}
  body:not(.running) .progress{background:var(--line)}
  .progress .bar{height:100%;background:currentColor;width:0%}

  .controls{display:flex;gap:12px}
  button{
    flex:1;font-size:17px;font-weight:600;padding:16px;border:none;border-radius:12px;
    cursor:pointer;font-family:inherit;letter-spacing:.05em;
  }
  #startBtn{background:var(--stretch);color:#fff}
  body.running #startBtn{background:rgba(255,255,255,.18);color:#fff}
  #resetBtn{background:transparent;border:1.5px solid var(--line);color:inherit;flex:0 0 30%}
  body.running #resetBtn{border-color:rgba(255,255,255,.4)}
  button:active{transform:scale(.98)}
  .hidden{display:none!important}
</style>
</head>
<body>
<div class="wrap">
  <h1>ストレッチタイマー</h1>

  <div class="setup" id="setup">
    <label for="presetSelect">保存した設定</label>
    <div class="preset-row">
      <select id="presetSelect"></select>
      <button type="button" class="mini" id="savePresetBtn">保存</button>
      <button type="button" class="mini" id="delPresetBtn">削除</button>
    </div>

    <label for="intervals">時間(秒)をカンマ区切りで入力</label>
    <input type="text" id="intervals" inputmode="numeric" value="60,10,50,10,50,10,120,10,120,10,60" autocomplete="off">
    <p class="hint">奇数番目=ストレッチ、偶数番目=休憩。<br>例: 120,10,120,10 → 2分ストレッチ→10秒休憩を2セット</p>
    <div class="row">
      <input type="checkbox" id="loop">
      <label for="loop" style="margin:0;font-size:14px;opacity:1">終わったら最初から繰り返す</label>
    </div>
  </div>

  <div class="display">
    <div class="phase-label" id="phaseLabel">準備OK?</div>
    <div class="time" id="time">--</div>
    <div class="sub" id="sub"></div>
    <div class="progress"><div class="bar" id="bar"></div></div>
  </div>

  <div class="controls">
    <button id="startBtn">スタート</button>
    <button id="resetBtn">リセット</button>
  </div>
</div>

<script>
(() => {
  const $ = id => document.getElementById(id);
  const timeEl=$('time'), phaseEl=$('phaseLabel'), subEl=$('sub'), barEl=$('bar');
  const startBtn=$('startBtn'), resetBtn=$('resetBtn');
  const inputEl=$('intervals'), loopEl=$('loop'), setupEl=$('setup');

  let audioCtx=null, wakeLock=null;
  let state='idle'; // idle | ready | running | paused | done
  let plan=[], idx=0, remaining=0, lastTick=0, rafId=null, lastBeepSecond=null;

  // ---- 設定の保存/復元 ----
  const STORAGE_KEY='stretch-timer-settings';
  function loadSettings(){
    try{
      const s=JSON.parse(localStorage.getItem(STORAGE_KEY));
      if(!s) return;
      if(typeof s.intervals==='string' && s.intervals.trim()!=='') inputEl.value=s.intervals;
      loopEl.checked=!!s.loop;
    }catch(e){}
  }
  function saveSettings(){
    try{
      localStorage.setItem(STORAGE_KEY, JSON.stringify({intervals:inputEl.value, loop:loopEl.checked}));
    }catch(e){}
  }
  inputEl.addEventListener('input',()=>{saveSettings();syncPresetSelection();});
  loopEl.addEventListener('change',()=>{saveSettings();syncPresetSelection();});
  loadSettings();

  // ---- プリセット(名前を付けて保存/選択) ----
  const PRESET_KEY='stretch-timer-presets';
  const presetSel=$('presetSelect'), savePresetBtn=$('savePresetBtn'), delPresetBtn=$('delPresetBtn');

  function loadPresets(){
    try{
      const p=JSON.parse(localStorage.getItem(PRESET_KEY));
      return Array.isArray(p)?p:[];
    }catch(e){ return []; }
  }
  function savePresets(list){
    try{ localStorage.setItem(PRESET_KEY, JSON.stringify(list)); }catch(e){}
  }
  function renderPresetOptions(selectedName){
    const list=loadPresets();
    presetSel.innerHTML='';
    const ph=document.createElement('option');
    ph.value='';
    ph.textContent=list.length ? '選択してください' : '(まだ保存がありません)';
    presetSel.appendChild(ph);
    for(const p of list){
      const o=document.createElement('option');
      o.value=p.name; o.textContent=p.name;
      presetSel.appendChild(o);
    }
    presetSel.value=selectedName||'';
    delPresetBtn.disabled=presetSel.value==='';
  }
  // 現在の入力がどれかのプリセットと一致していればそれを選択状態にする
  function syncPresetSelection(){
    const hit=loadPresets().find(p=>p.intervals===inputEl.value && !!p.loop===loopEl.checked);
    presetSel.value=hit?hit.name:'';
    delPresetBtn.disabled=presetSel.value==='';
  }

  presetSel.addEventListener('change',()=>{
    const p=loadPresets().find(x=>x.name===presetSel.value);
    delPresetBtn.disabled=!p;
    if(!p) return;
    inputEl.value=p.intervals;
    loopEl.checked=!!p.loop;
    saveSettings();
  });

  savePresetBtn.addEventListener('click',()=>{
    if(parsePlan().length===0){ alert('先に時間を入力してください(例: 120,10,120,10)'); return; }
    const name=(prompt('プリセット名を入力', presetSel.value||'')||'').trim();
    if(!name) return;
    const list=loadPresets();
    const i=list.findIndex(p=>p.name===name);
    if(i>=0){
      if(!confirm('「'+name+'」を上書きしますか?')) return;
      list[i]={name, intervals:inputEl.value, loop:loopEl.checked};
    }else{
      list.push({name, intervals:inputEl.value, loop:loopEl.checked});
    }
    savePresets(list);
    renderPresetOptions(name);
  });

  delPresetBtn.addEventListener('click',()=>{
    const name=presetSel.value;
    if(!name) return;
    if(!confirm('「'+name+'」を削除しますか?')) return;
    savePresets(loadPresets().filter(p=>p.name!==name));
    renderPresetOptions('');
  });

  renderPresetOptions('');
  syncPresetSelection();

  function beep(freq, dur=0.12, vol=0.4){
    if(!audioCtx) return;
    const o=audioCtx.createOscillator(), g=audioCtx.createGain();
    o.type='sine'; o.frequency.value=freq;
    g.gain.setValueAtTime(vol, audioCtx.currentTime);
    g.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime+dur);
    o.connect(g).connect(audioCtx.destination);
    o.start(); o.stop(audioCtx.currentTime+dur);
  }
  const tickSound=()=>beep(880,0.1,0.35);          // カウントダウン
  const goSound=()=>{beep(1320,0.18,0.5)};          // 区間開始
  const doneSound=()=>{beep(1320,0.15,0.5);setTimeout(()=>beep(1760,0.3,0.5),180)}; // 全部終了

  function parsePlan(){
    const nums=inputEl.value.replace(/、/g,',').split(',')
      .map(s=>parseFloat(s.trim())).filter(n=>!isNaN(n)&&n>0);
    return nums;
  }
  const phaseName=i=> i%2===0 ? 'ストレッチ' : '休憩';

  function fmt(sec){
    sec=Math.max(0,Math.ceil(sec));
    const m=Math.floor(sec/60), s=sec%60;
    return m>0 ? m+':'+String(s).padStart(2,'0') : String(s);
  }

  function setBodyPhase(cls){
    document.body.classList.remove('phase-stretch','phase-rest','phase-ready');
    if(cls) document.body.classList.add(cls);
  }

  async function requestWakeLock(){
    try{ if('wakeLock' in navigator) wakeLock=await navigator.wakeLock.request('screen'); }catch(e){}
  }
  function releaseWakeLock(){ try{ wakeLock&&wakeLock.release(); wakeLock=null; }catch(e){} }

  function render(){
    if(state==='ready'){
      phaseEl.textContent='スタートまで';
      timeEl.textContent=fmt(remaining);
      subEl.textContent='次: '+phaseName(0)+' '+fmt(plan[0]);
      barEl.style.width='0%';
    }else if(state==='running'||state==='paused'){
      phaseEl.textContent=phaseName(idx)+(state==='paused'?'(一時停止)':'');
      timeEl.textContent=fmt(remaining);
      const total=plan[idx];
      barEl.style.width=(100*(1-remaining/total))+'%';
      const next=idx+1<plan.length ? '次: '+phaseName(idx+1)+' '+fmt(plan[idx+1])
                : (loopEl.checked?'次: 最初から繰り返し':'これが最後');
      subEl.textContent=(idx+1)+' / '+plan.length+' ・ '+next;
    }else if(state==='done'){
      phaseEl.textContent='おつかれさま!';
      timeEl.textContent='✓';
      subEl.textContent='';
      barEl.style.width='100%';
    }
  }

  function startPhase(i){
    idx=i; remaining=plan[i]; lastBeepSecond=null;
    setBodyPhase(i%2===0?'phase-stretch':'phase-rest');
    goSound();
    render();
  }

  function loop(now){
    if(state!=='running'&&state!=='ready'){return;}
    const dt=(now-lastTick)/1000; lastTick=now;
    remaining-=dt;

    // 残り3秒でカウントダウン音
    const ceil=Math.ceil(remaining);
    if(ceil<=3 && ceil>=1 && ceil!==lastBeepSecond){ lastBeepSecond=ceil; tickSound(); }

    if(remaining<=0){
      if(state==='ready'){
        state='running'; document.body.classList.add('running');
        startPhase(0);
      }else if(idx+1<plan.length){
        startPhase(idx+1);
      }else if(loopEl.checked){
        startPhase(0);
      }else{
        state='done'; document.body.classList.remove('running');
        setBodyPhase(null); doneSound(); releaseWakeLock();
        startBtn.textContent='もう一度'; setupEl.classList.remove('hidden');
        render(); return;
      }
    }
    render();
    rafId=requestAnimationFrame(loop);
  }

  startBtn.addEventListener('click',()=>{
    if(state==='running'){ // 一時停止
      state='paused'; cancelAnimationFrame(rafId);
      startBtn.textContent='再開'; render(); return;
    }
    if(state==='paused'){ // 再開
      state='running'; lastTick=performance.now();
      startBtn.textContent='一時停止'; rafId=requestAnimationFrame(loop); render(); return;
    }
    // idle / done → 開始
    plan=parsePlan();
    if(plan.length===0){ alert('時間を入力してください(例: 120,10,120,10)'); return; }
    saveSettings();
    if(!audioCtx) audioCtx=new (window.AudioContext||window.webkitAudioContext)();
    audioCtx.resume();
    requestWakeLock();
    setupEl.classList.add('hidden');
    state='ready'; remaining=3; lastBeepSecond=null;
    setBodyPhase('phase-ready');
    document.body.classList.add('running');
    startBtn.textContent='一時停止';
    tickSound();
    lastTick=performance.now();
    render();
    rafId=requestAnimationFrame(loop);
  });

  resetBtn.addEventListener('click',()=>{
    cancelAnimationFrame(rafId); releaseWakeLock();
    state='idle'; idx=0;
    document.body.classList.remove('running'); setBodyPhase(null);
    setupEl.classList.remove('hidden');
    startBtn.textContent='スタート';
    phaseEl.textContent='準備OK?'; timeEl.textContent='--'; subEl.textContent='';
    barEl.style.width='0%';
  });

  document.addEventListener('visibilitychange',()=>{
    if(document.visibilityState==='visible'&&(state==='running'||state==='ready')){
      lastTick=performance.now(); // バックグラウンド復帰時のズレ補正
    }
  });

  // ---- PWA: Service Worker 登録 ----
  if('serviceWorker' in navigator){
    window.addEventListener('load',()=>{
      navigator.serviceWorker.register('./sw.js').catch(()=>{});
    });
  }
})();
</script>
</body>
</html>
